<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.SYSTEM_NAME }} - 企业登录</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <!-- 企业字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2d3748;
            --accent-color: #3182ce;
            --light-color: #f7fafc;
            --dark-color: #1a202c;
            --border-color: #e2e8f0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--dark-color);
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-2px);
        }
        
        .company-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .company-logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 1.75rem;
            font-weight: 700;
            box-shadow: 0 8px 16px rgba(26, 54, 93, 0.2);
        }
        
        .company-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }
        
        .company-tagline {
            color: #718096;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .login-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .form-label {
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-label i {
            color: var(--accent-color);
        }
        
        .form-control {
            padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.9375rem;
            transition: all 0.2s;
            background: #f7fafc;
        }
        
        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
            background: white;
        }
        
        .btn-login {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 0.875rem;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: all 0.3s;
            font-size: 0.9375rem;
            letter-spacing: 0.5px;
        }
        
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(26, 54, 93, 0.2);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 0.875rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            text-align: center;
            border: 1px solid #fc8181;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            color: #718096;
            font-size: 0.75rem;
            line-height: 1.5;
        }
        
        .user-options {
            margin-top: 1.5rem;
            text-align: center;
        }
        
        .user-option {
            display: inline-block;
            margin: 0 0.75rem;
            font-size: 0.75rem;
            color: #718096;
            background: #f7fafc;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        
        .user-option strong {
            color: var(--primary-color);
            font-weight: 600;
        }
        
        .time-display {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #a0aec0;
            background: #f7fafc;
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        
        .time-display i {
            margin-right: 0.25rem;
            color: var(--accent-color);
        }
        
        @media (max-width: 576px) {
            .login-card {
                padding: 2rem;
            }
            
            .company-logo {
                width: 64px;
                height: 64px;
                font-size: 1.5rem;
            }
            
            .company-name {
                font-size: 1.5rem;
            }
            
            .user-option {
                display: block;
                margin: 0.5rem 0;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="company-header">
                <div class="company-logo">
                    <i class="bi bi-graph-up"></i>
                </div>
                <h1 class="company-name">{{ config.SYSTEM_NAME }}</h1>
                <p class="company-tagline">企业级足球数据分析平台</p>
            </div>
            
            <h2 class="login-title">企业系统登录</h2>
            
            {% if error %}
            <div class="error-message">
                <i class="bi bi-exclamation-triangle"></i> {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="/login">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-person"></i> 用户名
                    </label>
                    <input type="text" class="form-control" name="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-lock"></i> 密码
                    </label>
                    <input type="password" class="form-control" name="password" placeholder="请输入密码" required>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> 登录企业平台
                </button>
            </form>
            
            <div class="time-display">
                <i class="bi bi-clock"></i> 北京时间: <span id="current-time">加载中...</span>
            </div>
            
            <div class="user-options">
                <div class="user-option">
                    <strong>管理员</strong>: admin / enterprise123
                </div>
                <div class="user-option">
                    <strong>分析师</strong>: analyst / enterprise123
                </div>
                <div class="user-option">
                    <strong>查看员</strong>: viewer / enterprise123
                </div>
            </div>
            
            <div class="login-footer">
                {{ config.COPYRIGHT }}<br>
                版本 {{ config.VERSION }} | 专业企业级系统
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 更新时间显示
        function updateTime() {
            const now = new Date();
            const beijingTime = new Date(now.getTime() + (8 * 60 * 60 * 1000)); // GMT+8
            const timeString = beijingTime.toISOString().replace('T', ' ').substr(0, 19);
            document.getElementById('current-time').textContent = timeString;
        }
        
        // 初始更新
        updateTime();
        
        // 每秒更新一次
        setInterval(updateTime, 1000);
        
        // 表单提交动画
        document.querySelector('form').addEventListener('submit', function(e) {
            const submitBtn = this.querySelector('.btn-login');
            submitBtn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> 登录中...';
            submitBtn.disabled = true;
        });
    </script>
</body>
</html>
