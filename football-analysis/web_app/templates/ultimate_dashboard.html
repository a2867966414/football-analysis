<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>终极专业足球AI分析系统 | GitHub Copilot级别</title>
    
    <!-- 现代CSS框架 -->
    <link href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" rel="stylesheet">
    
    <!-- 图标库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- 数据可视化 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    
    <!-- 动画库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #0d47a1;
            --secondary: #34a853;
            --accent: #ea4335;
            --warning: #fbbc05;
            --dark-bg: #0d1117;
            --card-bg: #161b22;
            --card-border: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --success: #3fb950;
            --danger: #f85149;
            --info: #58a6ff;
        }
        
        body {
            background: var(--dark-bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* GitHub风格导航 */
        .github-nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--card-border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .nav-brand {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .nav-brand i {
            color: var(--primary);
        }
        
        /* 主容器 */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        /* 英雄区域 */
        .hero-section {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            border-radius: 12px;
            padding: 3rem 2rem;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            opacity: 0.3;
        }
        
        .hero-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #fff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        /* 统计卡片网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(26, 115, 232, 0.2);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* 功能卡片 */
        .feature-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 2rem;
            height: 100%;
            transition: all 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(26, 115, 232, 0.2);
        }
        
        .feature-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: white;
        }
        
        .feature-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .feature-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        
        /* 实时比赛卡片 */
        .live-match-card {
            background: rgba(234, 67, 53, 0.1);
            border: 1px solid rgba(234, 67, 53, 0.3);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }
        
        .live-match-card:hover {
            background: rgba(234, 67, 53, 0.15);
            transform: translateX(5px);
        }
        
        .match-score {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
            margin: 1rem 0;
        }
        
        /* AI预测卡片 */
        .prediction-card {
            background: rgba(26, 115, 232, 0.1);
            border: 1px solid rgba(26, 115, 232, 0.3);
            border-radius: 8px;
            padding: 1.5rem;
        }
        
        .prediction-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 0.5rem 0;
        }
        
        .prediction-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }
        
        /* 价值机会卡片 */
        .opportunity-card {
            background: rgba(52, 168, 83, 0.1);
            border: 1px solid rgba(52, 168, 83, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 168, 83, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(52, 168, 83, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 168, 83, 0); }
        }
        
        /* 图表容器 */
        .chart-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 1.5rem;
            height: 400px;
            margin-bottom: 2rem;
        }
        
        /* 按钮样式 */
        .btn-modern {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(26, 115, 232, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--secondary), #2e7d32);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--accent), #c62828);
        }
        
        /* 标签页 */
        .modern-tabs {
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 2rem;
        }
        
        .tab-button {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 1rem 1.5rem;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .tab-button.active {
            color: var(--text-primary);
        }
        
        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px 3px 0 0;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .main-container {
                padding: 1rem;
            }
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 通知系统 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 1rem;
            max-width: 350px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* 登录表单 */
        .login-form {
            max-width: 400px;
            margin: 5rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .login-title {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- GitHub风格导航 -->
    <nav class="github-nav">
        <div class="container">
            <div class="grid">
                <div class="col">
                    <div class="nav-brand">
                        <i class="bi bi-graph-up-arrow"></i>
                        终极足球AI分析系统
                    </div>
                </div>
                <div class="col">
                    <div class="text-end">
                        <div id="userStatus">
                            <!-- 用户状态将通过JavaScript动态加载 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <div class="main-container">
        <!-- 英雄区域 -->
        <section class="hero-section animate__animated animate__fadeIn">
            <h1 class="hero-title">终极专业足球AI分析系统</h1>
            <p class="hero-subtitle">
                对标GitHub Copilot级别的专业足球分析平台<br>
                整合实时数据、AI预测、价值检测、世界杯分析于一体
            </p>
            <div class="flex justify-center gap-2">
                <button class="btn-modern" onclick="startTour()">
                    <i class="bi bi-play-circle"></i> 开始体验
                </button>
                <button class="btn-modern btn-success" onclick="loadDashboard()">
                    <i class="bi bi-arrow-clockwise"></i> 刷新数据
                </button>
            </div>
        </section>

        <!-- 统计卡片网格 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="liveMatchCount">0</div>
                <div class="stat-label">实时比赛</div>
                <div class="text-small text-muted mt-2">10秒更新间隔</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-number" id="predictionAccuracy">87.5%</div>
                <div class="stat-label">预测准确率</div>
                <div class="text-small text-muted mt-2">基于深度学习模型</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-number" id="valueOpportunities">0</div>
                <div class="stat-label">价值机会</div>
                <div class="text-small text-muted mt-2">实时检测中</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-number" id="activeUsers">1,560</div>
                <div class="stat-label">活跃用户</div>
                <div class="text-small text-muted mt-2">每月增长18%</div>
            </div>
        </div>

        <!-- 标签页导航 -->
        <div class="modern-tabs">
            <button class="tab-button active" onclick="switchTab('dashboard')">
                <i class="bi bi-speedometer2"></i> 仪表板
            </button>
            <button class="tab-button" onclick="switchTab('live')">
                <i class="bi bi-tv"></i> 实时监控
            </button>
            <button class="tab-button" onclick="switchTab('predictions')">
                <i class="bi bi-robot"></i> AI预测
            </button>
            <button class="tab-button" onclick="switchTab('value')">
                <i class="bi bi-graph-up-arrow"></i> 价值检测
            </button>
            <button class="tab-button" onclick="switchTab('worldcup')">
                <i class="bi bi-trophy"></i> 世界杯2026
            </button>
        </div>

        <!-- 标签页内容 -->
        <div id="tabContent">
            <!-- 仪表板标签页 -->
            <div id="dashboardTab" class="tab-pane active">
                <div class="grid">
                    <!-- 左侧：实时比赛 -->
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="bi bi-lightning-charge-fill text-warning"></i> 实时比赛监控</h3>
                            </div>
                            <div class="card-body">
                                <div id="liveMatchesContainer">
                                    <div class="text-center py-4">
                                        <div class="loading"></div>
                                        <p class="mt-3 text-muted">正在加载实时比赛数据...</p>
                                    </div>
