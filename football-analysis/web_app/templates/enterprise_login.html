<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业登录 | Football Intelligence Enterprise Platform</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 企业字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2d3748;
            --accent-color: #3182ce;
            --light-color: #f7fafc;
            --dark-color: #1a202c;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            padding: 2.5rem;
            border: 1px solid #e2e8f0;
        }
        
        .company-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .company-logo {
            width: 64px;
            height: 64px;
            background: var(--primary-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .company-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.25rem;
        }
        
        .company-tagline {
            color: #718096;
            font-size: 0.875rem;
        }
        
        .login-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .form-label {
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        
        .form-control {
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        
        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        }
        
        .btn-login {
            background: var(--primary-color);
            color: white;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: all 0.2s;
        }
        
        .btn-login:hover {
            background: #2d3748;
            transform: translateY(-1px);
        }
        
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-align: center;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
            color: #718096;
            font-size: 0.75rem;
        }
        
        .user-options {
            margin-top: 1rem;
            text-align: center;
        }
        
        .user-option {
            display: inline-block;
            margin: 0 0.5rem;
            font-size: 0.75rem;
            color: #718096;
        }
        
        .user-option strong {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="company-header">
                <div class="company-logo">FI</div>
                <h1 class="company-name">Football Intelligence</h1>
                <p class="company-tagline">Enterprise Platform v3.0</p>
            </div>
            
            <h2 class="login-title">企业系统登录</h2>
            
            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="/login">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" name="username" placeholder="输入用户名" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" name="password" placeholder="输入密码" required>
                </div>
                
                <button type="submit" class="btn-login">登录企业平台</button>
            </form>
            
            <div class="user-options">
                <div class="user-option">
                    <strong>管理员</strong>: admin / enterprise123
                </div>
                <div class="user-option">
                    <strong>分析师</strong>: analyst / enterprise123
                </div>
                <div class="user-option">
                    <strong>查看者</strong>: viewer / enterprise123
                </div>
            </div>
            
            <div class="login-footer">
                © 2026 Football Intelligence Inc. All Rights Reserved.<br>
                企业级足球分析平台
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
